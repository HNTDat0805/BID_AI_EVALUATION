version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - URL_CO_SO_DU_LIEU=postgresql://postgres:postgres@db:5432/he_thong_danh_gia
    volumes:
      - .:/app

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: he_thong_danh_gia
    ports:
      - "5432:5432"
    volumes:
      - du_lieu_postgres:/var/lib/postgresql/data

volumes:
  du_lieu_postgres:
